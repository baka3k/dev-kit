interface:
  display_name: "Reverse Engineering C++"
  short_description: "Validated C++ reverse and migration artifact packages"
  default_prompt: "Use $hi-reverse to select a use-case, module, or migration profile; retrieve evidence through FalkorDB and Qdrant; and generate a validated artifact package with package-manifest gates."

dependencies:
  tools:
    - type: "mcp"
      value: "mind_mcp"
      description: "Retrieve project concepts, passages, entities, and relations when documentation is allowed."
    - type: "mcp"
      value: "graph_mcp"
      description: "Use Qdrant semantic retrieval and FalkorDB graph expansion for code relationships, paths, and evidence."
    - type: "mcp"
      value: "serena"
      description: "Enrich Graph-RAG anchors with source symbols, references, patterns, and line context."

policy:
  allow_implicit_invocation: true
