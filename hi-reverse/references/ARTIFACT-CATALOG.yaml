{
  "version": 1,
  "support_statuses": {
    "supported": "Technique, template, validator, registry entry, and fixture validation exist.",
    "partial": "Retrieval or generation exists, but the complete support contract is missing.",
    "planned": "Design only; do not generate as a completed artifact.",
    "unsupported": "Unavailable; report the gap instead of fabricating output."
  },
  "conditions": {
    "stateful": "Multiple business states or guarded transitions are evidenced.",
    "ipc": "IPC, messages, callbacks, host requests, or process boundaries are evidenced.",
    "persistence": "Persistent files, database data, shared memory, or durable records are evidenced.",
    "concurrency": "Threads, locks, queues, interrupts, or asynchronous ownership are evidenced.",
    "branching": "A use case has material decision, alternate, error, timeout, or recovery branches.",
    "distributed": "Multiple processes, services, devices, or runtime nodes are evidenced."
  },
  "profiles": {
    "usecase": {
      "description": "Evidence-backed documentation for each selected use case.",
      "extends": [

      ],
      "required": [
        "discovery-manifest",
        "usecase-document",
        "trace-manifest",
        "sequence-diagram",
        "class-diagram"
      ],
      "conditional": {
        "branching": [
          "activity-diagram"
        ]
      }
    },
    "module": {
      "description": "Complete behavioral and structural documentation for one C/C++ module.",
      "extends": [
        "usecase"
      ],
      "required": [
        "module-overview",
        "entrypoint-catalog",
        "module-map",
        "component-context",
        "business-rules",
        "error-recovery",
        "evidence-ledger",
        "open-questions",
        "glossary",
        "coverage"
      ],
      "conditional": {
        "stateful": [
          "state-machine"
        ],
        "ipc": [
          "interface-catalog",
          "ipc-topology"
        ],
        "persistence": [
          "data-dictionary",
          "data-flow"
        ],
        "concurrency": [
          "concurrency-model"
        ],
        "distributed": [
          "deployment-runtime"
        ]
      }
    },
    "migration": {
      "description": "Module package plus C++ to Java migration contracts and parity evidence.",
      "extends": [
        "module"
      ],
      "required": [
        "migration-parity",
        "type-mapping",
        "interface-mapping",
        "migration-waves",
        "migration-risks",
        "test-scenarios"
      ],
      "conditional": {
      }
    }
  },
